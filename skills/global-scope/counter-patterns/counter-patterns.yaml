# Counter-Patterns canonical rule library
#
# Source-of-truth for the moment-of-action rules. Hooks read from this file
# and inject the relevant rule into the agent's context at the moment it
# applies — addressing the "rules-in-CLAUDE.md decay over a long context"
# problem documented in references/MECHANISMS.md.
#
# Schema:
#   id:        CP-NNN, stable identifier
#   title:     human-readable rule name
#   summary:   one-line for status displays / hook output
#   channel:   where this rule fires from (hook event or skill mode)
#   trigger:   plain-language condition that fires it
#   severity:  info | warn | critical (governs hook block-vs-warn behavior)
#   text:      what gets injected into the agent's context when triggered
#   evidence:  generic description of the failure mode the rule prevents
#
# Adding a rule: append a new CP-NNN entry, do not renumber existing ones.
# Removing a rule: leave the entry but set channel: deprecated, with a note.

version: 1
source: "Cross-project pattern analysis of recurring LLM-coding failure modes."

counter_patterns:

  # ── Critical: completion-time fraud prevention ───────────────────────────

  CP-001:
    title: "Tests are not evidence of wiring"
    summary: "Passing test on a function with no production caller = dead code in costume"
    channel: hook:pre-completion
    trigger: "completion language ('done', 'wired up', 'shipped', 'complete', 'ready') in agent message"
    severity: critical
    text: |
      REMINDER (CP-001): tests are evidence of isolated correctness, not of wiring.
      Before declaring this complete, grep for production callers of the symbol(s) you changed:
        git grep -n '<symbol>' -- ':!tests/' ':!**/*_test.*' ':!**/test_*'
      If the only callers are in tests/, the symbol is dead code wearing a passing-test costume — say so explicitly.
    evidence: |
      Pattern: a function that has passing unit tests but is never called from production code path inherits
      "shipped" framing from the test signal. Repeated observation: substantial fractions of test suites can
      end up exercising functions that production never invokes. Test isolation rewards orphan functions.

  CP-002:
    title: "Cite-the-line for runtime claims"
    summary: "Every 'X happens at runtime' claim needs a file:line"
    channel: hook:pre-completion
    trigger: "completion language without file:line pattern in same message"
    severity: critical
    text: |
      REMINDER (CP-002): every "X happens at runtime" claim must point at the line that makes it happen.
      Before stopping: list one file:line for each runtime claim a skeptical reviewer would check.
      If the line doesn't exist, the claim is wrong.
    evidence: |
      Pattern: RLHF rewards confident completion language; without a citation discipline, narrative claims
      slip past review. Config-derived labels, test names, and scenario titles read as evidence when they
      are only metadata. The file:line citation forces narrative back to observable runtime fact.

  CP-003:
    title: "Wiring vs backend (dispatch-path completion)"
    summary: "Trace entry-point -> handler end-to-end before declaring done"
    channel: hook:pre-completion
    trigger: "completion language for a feature involving entry-point and handler in different files"
    severity: critical
    text: |
      REMINDER (CP-003): a feature is done only when entry-point -> handler is traceable end-to-end.
      No todo!(), no `if false`, no commented-out dispatch line, no `_ = handler` discard.
      Cite TWO file:line locations: the entry-point AND the handler.
    evidence: |
      Pattern: a backend handler is implemented and tested in isolation, an entry-point (CLI flag, HTTP route,
      UI button, config flag, plugin slot) exists, but no production code wires the two together — the dispatch
      line is missing, commented out, gated behind a permanently-false condition, or returns the result without
      using it. The "easy half" (backend) ships; the "load-bearing half" (dispatch) does not.

  CP-004:
    title: "Deploy-validation reads runtime signal, not metadata"
    summary: "Pipeline 'healthy' / exit 0 / deploy logs are metadata; probe the actual layer"
    channel: hook:pre-completion
    trigger: "deploy/health/migration claim ('deployed', 'healthy', 'migration succeeded', 'redeploy completed')"
    severity: critical
    text: |
      REMINDER (CP-004): a deploy is "successful" only when a probe exercises the layer that was deployed.
      DB: a SELECT 1 or equivalent against the actual DSN (not the pipeline's view of it).
      Service: a synthetic request that round-trips data through the persistence layer.
      Migration: a row-count or schema query on the target database.
      Pipeline exit codes and "healthy" status pages are metadata and lie when secrets/config are wrong.
    evidence: |
      Pattern: deploy pipelines and health endpoints emit "successful" signals that derive from the pipeline's
      own state, not from the deployed service's ability to reach its dependencies. A placeholder secret, a
      misconfigured DSN, a permissioning gap — none of these block the pipeline's "healthy" reading. The only
      reliable signal is a probe that exercises the layer the deploy was meant to change.

  CP-005:
    title: "Local-narrative bias counter"
    summary: "If you're narrating from one file, lift to a global check before claiming runtime behavior"
    channel: hook:pre-completion
    trigger: "claim of runtime behavior ('dispatches', 'calls', 'writes', 'logs', 'sends') without grep evidence"
    severity: warn
    text: |
      REMINDER (CP-005): you tend to narrate from the file you're editing.
      Before claiming "X dispatches to Y" / "writes to Z" / "logs W", grep for the call site that proves the path.
      If the grep is too expensive, say "I haven't verified end-to-end" rather than asserting.
    evidence: |
      Pattern: while editing a single file the model's "local goal" becomes making that file consistent with
      itself. The file declares an intent ("this dispatches to X"); the model narrates that intent as runtime
      fact. Whether the runtime path actually matches is a non-local check the immediate diff does not force.
      The fix is to periodically lift from local-narrative to global-check, especially around verbs that name
      runtime behavior.

  # ── Critical: pre-edit / source-selection ────────────────────────────────

  CP-006:
    title: "Source-of-truth selection"
    summary: "When multiple sources could answer 'what should this do?', name the canonical one before writing"
    channel: hook:pre-edit
    trigger: "first Edit/Write in a session where both spec/BDD AND existing code are present"
    severity: warn
    text: |
      REMINDER (CP-006): name the canonical source before writing.
      Default order: spec/BDD > UI contract > existing tests > current code > legacy code > prose docs.
      Cite the source in the commit message. Closest-readable is not canonical.
    evidence: |
      Pattern: when more than one source could plausibly answer "what should this code do?" — a spec, current
      code, legacy code, the brief, prose docs — the model reaches for the closest readable artifact. Short
      legacy files cost fewer tokens than long specs, so token-economy bias defaults to legacy. Result: PRs
      built against the wrong source-of-truth, closed and redone.

  CP-007:
    title: "Brief references must resolve"
    summary: "Verify cited paths/lines/PRs exist before relying on them"
    channel: hook:pre-edit
    trigger: "user prompt contains a path/file/PR/line/commit reference"
    severity: warn
    text: |
      REMINDER (CP-007): when the user cites a specific path, line, or PR by identifier,
      verify it resolves before relying on it. If Read returns 404 or content doesn't match the description,
      stop and ask — never substitute the closest match silently.
    evidence: |
      Pattern: a brief cites a path or line range that does not resolve (typo, stale numbering, wrong repo).
      The model silently substitutes the closest match it can find. Cascading wrong work follows because the
      substitution is invisible — the model narrates as if it had the artifact the user actually meant.

  # ── Critical: branch / git discipline ────────────────────────────────────

  CP-008:
    title: "Branch check before code-modifying tools"
    summary: "First tool call in a coding session must verify branch"
    channel: hook:pre-tool
    trigger: "Edit/Write/NotebookEdit or Bash with git commit/push on protected branch"
    severity: critical
    text: |
      DENIED (CP-008): you are on a protected branch (main/master/develop/trunk/prod).
      Project policy says: stop and ask to branch first before any change. Do not proceed even if user says 'just do it'.
      Recovery:  git stash && git checkout -b feature/<name> && git stash pop
    evidence: |
      Pattern: a coding session begins on the protected branch and the model dives into edits without verifying
      branch state. Many turns later the user catches it via manual git status; the corrective stash/pop can
      then partially destroy the work being preserved. Catching it before the first edit is much cheaper than
      catching it later.

  CP-009:
    title: "Destructive authorizations are one-shot"
    summary: "force-push approved != standing license; re-confirm next destructive op"
    channel: hook:pre-tool
    trigger: "Bash with git reset --hard / push --force / branch -D / repo deletion after recent approval marker"
    severity: critical
    text: |
      REMINDER (CP-009): an earlier "*APPROVED*" / "nuke it" / "force push approved" applies to that op only.
      Re-confirm THIS destructive op with the user before proceeding.
    evidence: |
      Pattern: a user approves one destructive operation ("force push approved", "nuke it"); the model
      generalizes the approval into a session-wide license and proceeds with later destructive ops without
      re-confirming. Destructive ops compound in damage and do not deserve a standing license.

  # ── High: session continuity ────────────────────────────────────────────

  CP-010:
    title: "Post-compaction state reconciliation"
    summary: "First action after compaction: reconcile reality vs summary"
    channel: hook:user-prompt-resume-detect
    trigger: "session marker indicates compaction OR 'continued from previous' header OR user says resume/continue"
    severity: critical
    text: |
      REMINDER (CP-010): you may have lost concrete state in compaction. Run state reconciliation FIRST:
        git status && git branch -vv && gh pr list --author @me --state open && git worktree list
        git log --oneline -20
      If AGENT_STATE.md exists at repo root, read it. Surface drift to user before doing work.
    evidence: |
      Pattern: compaction preserves narrative ("we built X, then Y") but loses concrete state (which branch,
      which PR, which worktree, which commits actually landed). Post-compaction the model resumes and either
      redoes work that is already on disk or works on a stale branch. Mid-session pivots produce hybrid
      artifacts that confuse later sessions.

  CP-011:
    title: "Mid-session pivot acknowledgment"
    summary: "Name what you're abandoning and what you're keeping"
    channel: hook:user-prompt-resume-detect
    trigger: "user message starts with 'actually'/'wait'/'stop'/'pivot'/'instead' or contradicts earlier instruction"
    severity: warn
    text: |
      REMINDER (CP-011): user is pivoting. Before continuing, summarize what you're abandoning and what you're keeping.
      Don't silently mix old and new direction.
    evidence: |
      Pattern: the user signals a pivot ("actually...", "wait...", "let's shift..."); the model continues
      blending the prior direction with the new one without explicitly naming the boundary. Result: hybrid
      artifacts containing both abandoned and current work, hard to untangle later.

  # ── High: completion bookkeeping ────────────────────────────────────────

  CP-012:
    title: "End-of-task disposition line"
    summary: "Every code-modifying task ends with PR/branch/worktree disposition"
    channel: hook:pre-completion
    trigger: "code-modifying task complete (commit/PR landed)"
    severity: warn
    text: |
      REMINDER (CP-012): close every code-modifying task with one line:
        "PR #N opened; worktree at /abs/path; branch <name> — propose to delete after merge"
      Don't let stale worktrees and branches accumulate.
    evidence: |
      Pattern: a task ends with a "shipped" claim but no disposition for the branch, worktree, or PR that
      held the work. Branches and worktrees accumulate as silent debris; weeks later the user has to do a
      cleanup pass. Stating the disposition at end-of-task converts the cleanup from forensic to bookkeeping.

  CP-013:
    title: "Recommendation followthrough"
    summary: "If you recommended X and the user moved on without explicit acknowledgment, confirm before doing Y"
    channel: hook:pre-completion
    trigger: "agent made architectural/directional recommendation in recent turn; current action != recommendation"
    severity: warn
    text: |
      REMINDER (CP-013): you recommended an approach earlier. Before silently doing something else,
      ask: "I recommended X — confirming you want X?" Quietly downgrading your own recommendations is a high-trust failure.
    evidence: |
      Pattern: the model recommends approach X (e.g., "ditch and redo"), the user's next message moves on
      without explicit acceptance or rejection, the model quietly downgrades to the easier path. The user has
      to remind the model of its own prior recommendation — a high-trust failure.

  CP-014:
    title: "Multi-axis brief: per-axis budget and report"
    summary: "Allocate attention per axis up front; report per axis at end"
    channel: hook:user-prompt-multi-axis-detect
    trigger: "user brief lists multiple review/implementation dimensions (e.g. 'security and reliability and tests')"
    severity: warn
    text: |
      REMINDER (CP-014): brief lists multiple dimensions. Allocate explicit attention budget per axis BEFORE starting.
      Report findings per axis at end. Empty axes are findings too ("logic: no concerns surfaced" forces you to show you looked).
      Charismatic axes (security, novelty) crowd out boring ones (correctness, completeness).
    evidence: |
      Pattern: a brief lists multiple dimensions (security + reliability + correctness + tests). The model
      focuses on the charismatic axes and silently drops the others. Without a per-axis report, the gap is
      invisible — empty axes look the same as "no findings".

  # ── High: load-bearing surface review ───────────────────────────────────

  CP-015:
    title: "External adversarial review for load-bearing surfaces"
    summary: "Before merge to main on load-bearing code, run external review (different model / different reviewer)"
    channel: hook:pre-pr-ready
    trigger: "agent about to mark PR ready / user asks 'is this ready to merge' on a load-bearing surface"
    severity: critical
    text: |
      REMINDER (CP-015): self-review is constrained by the same biases that produced the work.
      For load-bearing surfaces (auth, payments, deploy pipeline, multi-agent orchestration, persistence),
      run /ultrareview or attach an external (different-model) review BEFORE merge.
      Text-only self-review tops out around 80%; external review with different RLHF is the only mechanism
      that consistently catches the remaining 20% (the "shipped fraud" failures).
    evidence: |
      Pattern: a model self-reviews code it just wrote and endorses it; an external reviewer (different model,
      different training) surfaces shipped-but-broken features the original model could not see. The
      "Potemkin village" failure mode — features that look real and pass self-review but are hollow inside —
      is consistently caught only by external review across the corpus.

  # ── Medium: hygiene ─────────────────────────────────────────────────────

  CP-016:
    title: "Worktree absolute paths"
    summary: "In multi-worktree tasks, use absolute paths for every file write"
    channel: hook:pre-edit
    trigger: "Edit/Write while git worktree list shows >1 worktree"
    severity: warn
    text: |
      REMINDER (CP-016): multiple worktrees detected. Use absolute paths for every file write.
      Relative paths plus shell cd are how agents end up editing the parent checkout instead of the worktree.
    evidence: |
      Pattern: in multi-worktree workflows, relative paths combined with shell cd lead to writes landing in
      the parent checkout instead of the intended worktree. Absolute paths sidestep the bug entirely.

  CP-017:
    title: "Bulk file generation: globally-unique names"
    summary: "When generating >5 files of the same kind, use globally-unique names"
    channel: hook:pre-edit
    trigger: "Write tool used >5 times in same session for same file basename"
    severity: warn
    text: |
      REMINDER (CP-017): you're generating many files with the same base name.
      Use globally-unique keys (control ID, ticket ID, timestamp, hash) so they collate cleanly.
      Imagine: find . -name '*.md' | xargs -I{} cp {} /tmp/all/  — every name should remain distinguishable.
    evidence: |
      Pattern: bulk generation of many files (evidence, fixtures, generated docs) under a shared basename
      makes downstream collation impossible without a renaming pass. Globally-unique names from the start
      cost nothing and remove the cleanup.

  CP-018:
    title: "CI parity"
    summary: "Run the EXACT command CI runs before declaring PR ready"
    channel: hook:pre-pr-ready
    trigger: "agent about to mark PR ready / push to PR branch"
    severity: warn
    text: |
      REMINDER (CP-018): before declaring PR ready, open .github/workflows/*.yml (or equivalent CI config)
      and run the EXACT command CI runs. Local-mode tooling is not always the same as CI-mode tooling:
      flags differ, strictness differs, lint sets differ. Read the workflow, copy the command, run it.
    evidence: |
      Pattern: local lint/test passes; CI fails because CI runs the same tool with stricter flags or a wider
      scope. The model declares PR ready based on local-pass and is surprised by CI failure. Reading the
      workflow file before declaring ready closes the gap.

  # ── Meta ────────────────────────────────────────────────────────────────

  CP-019:
    title: "Reminders decay; mechanical guards are load-bearing"
    summary: "If you notice you drifted from a rule, surface the drift event itself"
    channel: ambient
    trigger: "(meta — not directly enforced)"
    severity: info
    text: |
      META-RULE (CP-019): the rules above catch roughly 80% from text alone. The load-bearing 20% requires
      mechanical guards (hooks, CI lints, this /counter-patterns skill) and external adversarial review.
      If you notice you drifted from a rule, surface the drift explicitly: "I drifted from CP-NNN;
      here's the catch and recovery." The drift event is itself evidence the text-only reminder isn't enough —
      file it as an enforcement gap rather than quietly correcting.
    evidence: |
      Pattern: rules in long-context CLAUDE.md files are intermittently honored — defaults reassert across
      a long session and single mid-session reminders are the weakest signal. Text-only protocols are
      effective for the majority of cases but not for the load-bearing minority where they matter most.
      Pairing text with mechanical guards (hooks that fire at the moment of action) and external review
      closes the gap.
